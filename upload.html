<!-- Fichier : upload.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Panama 🇵🇦</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; text-align: center; background: #e0f2f1; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, button { width: 100%; margin: 10px 0; padding: 15px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
        button { background: #00897b; color: white; border: none; font-weight: bold; cursor: pointer; }
        #preview { width: 100%; max-height: 300px; object-fit: contain; display: none; margin-bottom: 10px; }
        #status { font-weight: bold; color: #004d40; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Nouvelle Photo 🌴</h1>
        <img id="preview" src="">
        <input type="file" id="file-input" accept="image/*">
        <p id="day-info"></p>
        <button onclick="uploadPhoto()">Envoyer au Panama</button>
        <div id="status"></div>
    </div>

    <script>
        const CLOUD_NAME = "dpasedzy0"; // <--- METS TON NOM ICI
        const UPLOAD_PRESET = "panama_preset";
        const START_DATE = new Date('2026-03-26'); // Date de départ

        // Calcul du jour actuel
        function getTripDay() {
            const today = new Date();
            const diff = Math.floor((today - START_DATE) / (1000 * 60 * 60 * 24)) + 1;
            return diff > 0 ? diff : 1;
        }

        document.getElementById('day-info').innerText = "Nous sommes au Jour " + getTripDay();

        // Aperçu de l'image
        document.getElementById('file-input').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = function() {
                const preview = document.getElementById('preview');
                preview.src = reader.result;
                preview.style.display = "block";
            }
            reader.readAsDataURL(e.target.files[0]);
        };

        async function uploadPhoto() {
            const file = document.getElementById('file-input').files[0];
            if (!file) return alert("Choisis une image !");

            const status = document.getElementById('status');
            status.innerText = "Téléchargement en cours... ⏳";

            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);
            formData.append('tags', `panama,test-unitaire`); // Tag simple pour le test

            try {
                const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json(); // On récupère la réponse de Cloudinary

                if (response.ok) {
                    status.innerText = "✅ Succès !";
                    console.log("Détails Cloudinary:", result);
                } else {
                    // Affiche l'erreur précise renvoyée par Cloudinary
                    status.innerText = "❌ Erreur : " + result.error.message;
                    alert("Erreur Cloudinary : " + result.error.message);
                }
            } catch (err) {
                status.innerText = "❌ Erreur réseau ou URL.";
                console.error(err);
            }
        }
    </script>
</body>
</html>
